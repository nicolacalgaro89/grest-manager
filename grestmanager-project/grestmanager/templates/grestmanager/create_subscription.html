<!DOCTYPE html>
<html>

<head>
  <title>Creazione Sottoscrizione</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body">
            <h2 class="card-title text-center mb-4">Creazione Sottoscrizione</h2>
            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                {{ form.as_p }}
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Invia</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
